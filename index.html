<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Pottery Toolkit — Product Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --clay:#C4714A;--clay-hover:#B0603C;--clay-light:#F7EDE6;--clay-dark:#7A3F22;
  --sand:#F5F0EB;--sand-dark:#E8DDD3;--kiln:#2A2420;--smoke:#6B6360;--fog:#A8A29E;
  --white:#FFFFFF;--border:rgba(42,36,32,0.12);--border-md:rgba(42,36,32,0.22);
  --shadow-sm:0 1px 3px rgba(42,36,32,0.08);--shadow-lg:0 8px 32px rgba(42,36,32,0.18);
  --radius-sm:6px;--radius-md:10px;--radius-lg:16px;--radius-xl:24px;
  --font-display:'DM Serif Display',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif;
  --green:#1E7D40;--green-light:#E2F5E9;--amber:#8A5E00;--amber-light:#FEF3DC;
  --red:#B94444;--red-light:#FDE8E8;--purple:#5B3EC5;--purple-light:#EDE9FE;
}
body{font-family:var(--font-body);background:var(--sand);color:var(--kiln);min-height:100vh;line-height:1.6}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-card{background:var(--white);border-radius:var(--radius-xl);padding:3rem 2.5rem;width:100%;max-width:380px;box-shadow:var(--shadow-lg);border:1px solid var(--border);text-align:center}
.auth-logo{font-family:var(--font-display);font-size:1.75rem;color:var(--kiln);margin-bottom:.25rem}
.auth-sub{font-size:.8125rem;color:var(--smoke);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2rem}
.auth-card input[type="password"]{width:100%;padding:.75rem 1rem;font-family:var(--font-body);font-size:1rem;border:1.5px solid var(--border-md);border-radius:var(--radius-md);background:var(--sand);color:var(--kiln);outline:none;transition:border-color .2s;text-align:center;letter-spacing:.15em;margin-bottom:1rem}
.auth-card input[type="password"]:focus{border-color:var(--clay)}
.auth-error{font-size:.8125rem;color:var(--red);margin-bottom:.75rem;min-height:1.2rem}

/* LAYOUT */
#app{display:none;min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
.topbar-brand{font-family:var(--font-display);font-size:1.25rem;color:var(--kiln);display:flex;align-items:center;gap:.5rem}
.topbar-brand span{font-family:var(--font-body);font-size:.75rem;color:var(--fog);font-weight:400;letter-spacing:.06em;text-transform:uppercase;border-left:1px solid var(--border-md);padding-left:.75rem;margin-left:.25rem}
.main{max-width:1100px;margin:0 auto;padding:2rem 2rem 4rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--font-body);font-size:.8125rem;font-weight:500;cursor:pointer;border:none;border-radius:var(--radius-md);padding:.5rem 1rem;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--clay);color:var(--white)}.btn-primary:hover{background:var(--clay-hover)}
.btn-ghost{background:transparent;color:var(--smoke);border:1px solid var(--border-md)}.btn-ghost:hover{background:var(--sand);color:var(--kiln)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(185,68,68,.3)}.btn-danger:hover{background:var(--red-light)}
.btn-success{background:var(--green);color:var(--white)}.btn-success:hover{background:#186535}
.btn-sm{padding:.3rem .65rem;font-size:.75rem}
.btn-xs{padding:.2rem .45rem;font-size:.7rem}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem;margin-bottom:2rem}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;cursor:pointer;transition:all .15s}
.stat-card:hover{border-color:var(--clay);box-shadow:var(--shadow-sm)}
.stat-card.active-stat{border-color:var(--clay);background:var(--clay-light)}
.stat-num{font-family:var(--font-display);font-size:2.25rem;color:var(--kiln);line-height:1;margin-bottom:.25rem}
.stat-label{font-size:.75rem;color:var(--smoke);text-transform:uppercase;letter-spacing:.07em}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.filter-pills{display:flex;gap:.4rem;flex-wrap:wrap}
.pill{padding:.3rem .875rem;border-radius:100px;font-size:.75rem;font-weight:500;border:1px solid var(--border-md);background:var(--white);color:var(--smoke);cursor:pointer;transition:all .15s;font-family:var(--font-body)}
.pill:hover{border-color:var(--clay);color:var(--clay)}
.pill.active{background:var(--clay);color:var(--white);border-color:var(--clay)}
.search-wrap{position:relative;flex-shrink:0}
.search-wrap svg{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--fog);pointer-events:none}
.search-input{padding:.45rem .75rem .45rem 2rem;font-family:var(--font-body);font-size:.8125rem;border:1px solid var(--border-md);border-radius:var(--radius-md);background:var(--white);color:var(--kiln);width:200px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--clay)}
.search-input::placeholder{color:var(--fog)}

/* IDEA CARDS */
.ideas-grid{display:flex;flex-direction:column;gap:.75rem}
.idea-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow .2s,border-color .2s}
.idea-card:hover{box-shadow:var(--shadow-sm)}
.idea-card.open{border-color:var(--clay)}
.idea-card-header{display:flex;align-items:center;gap:.875rem;padding:1rem 1.25rem;cursor:pointer;user-select:none}
.priority-pip{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pip-high{background:#D94F4F}.pip-medium{background:#E09A2B}.pip-low{background:#5A9A5A}
.idea-main{flex:1;min-width:0}
.idea-name-row{display:flex;align-items:center;gap:.5rem}
.idea-name{font-size:.9375rem;font-weight:500;color:var(--kiln)}
.edit-name-btn{background:none;border:none;color:var(--fog);cursor:pointer;padding:.15rem .3rem;border-radius:4px;font-size:.75rem;transition:all .15s;display:flex;align-items:center}
.edit-name-btn:hover{color:var(--clay);background:var(--clay-light)}
.idea-chips{display:flex;align-items:center;gap:.5rem;margin-top:.25rem;flex-wrap:wrap}
.badge{display:inline-block;padding:.15rem .6rem;border-radius:100px;font-size:.6875rem;font-weight:500}
.badge-idea{background:#E3EEFF;color:#2255B8}.badge-research{background:var(--amber-light);color:var(--amber)}
.badge-prototyping{background:var(--purple-light);color:var(--purple)}.badge-testing{background:var(--green-light);color:var(--green)}
.badge-ready{background:#D9F5EF;color:#0D6B55}.badge-paused{background:#EEECEA;color:#6B6360}
.badge-final{background:var(--green-light);color:var(--green)}.badge-draft{background:var(--amber-light);color:var(--amber)}
.badge-archived{background:#EEECEA;color:#6B6360}
.cat-chip{font-size:.6875rem;color:var(--smoke);background:var(--sand);padding:.15rem .55rem;border-radius:100px}
.chevron{color:var(--fog);flex-shrink:0;transition:transform .2s}
.idea-card.open .chevron{transform:rotate(180deg)}

/* TABS */
.idea-body{display:none;border-top:1px solid var(--border)}
.idea-card.open .idea-body{display:block}
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 1.25rem;overflow-x:auto}
.tab-btn{padding:.65rem 1rem;font-size:.8rem;font-weight:500;color:var(--fog);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:var(--font-body);transition:all .15s}
.tab-btn:hover{color:var(--smoke)}
.tab-btn.active{color:var(--clay);border-bottom-color:var(--clay)}
.tab-panel{display:none;padding:1.25rem}
.tab-panel.active{display:block}

/* FIELDS */
.field-label{font-size:.6875rem;text-transform:uppercase;letter-spacing:.08em;color:var(--fog);margin-bottom:.3rem}
.field-value{font-size:.875rem;color:var(--kiln);line-height:1.55}
.field-value.empty{color:var(--fog);font-style:italic}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}

/* PROGRESS */
.progress-wrap{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.progress-track{height:6px;background:var(--sand-dark);border-radius:100px;margin-top:.5rem;overflow:hidden}
.progress-fill{height:100%;background:var(--clay);border-radius:100px;transition:width .4s ease}

/* TAGS */
.tags-row{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{padding:.2rem .6rem;border-radius:100px;font-size:.6875rem;background:var(--clay-light);color:var(--clay-dark);font-weight:500}

/* CARD CONTROLS */
.card-controls{display:flex;gap:.5rem;padding:.875rem 1.25rem;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center;background:var(--sand)}
.inline-select{font-family:var(--font-body);font-size:.8125rem;padding:.35rem .6rem;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--white);color:var(--kiln);cursor:pointer;outline:none}
.spacer{flex:1}
.meta-date{font-size:.6875rem;color:var(--fog);align-self:center}

/* COMPONENTS */
.component-list{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem}
.component-card{background:var(--sand);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.component-header{display:flex;align-items:center;gap:.75rem;padding:.875rem 1rem;cursor:pointer}
.component-img{width:48px;height:48px;border-radius:var(--radius-sm);object-fit:cover;flex-shrink:0;background:var(--sand-dark)}
.component-img-placeholder{width:48px;height:48px;border-radius:var(--radius-sm);background:var(--sand-dark);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--fog);font-size:1.25rem}
.component-info{flex:1;min-width:0}
.component-name{font-size:.9rem;font-weight:500;color:var(--kiln)}
.component-meta{font-size:.75rem;color:var(--smoke);margin-top:.15rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.component-body{display:none;border-top:1px solid var(--border);padding:1rem}
.component-card.open .component-body{display:block}
.component-card.open .component-header .comp-chevron{transform:rotate(180deg)}
.comp-chevron{color:var(--fog);transition:transform .2s;flex-shrink:0}
.final-badge{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .55rem;border-radius:100px;font-size:.6875rem;font-weight:600;background:var(--green-light);color:var(--green)}

/* VERSIONS */
.version-timeline{display:flex;flex-direction:column;gap:0;position:relative;padding-left:1.5rem;margin-bottom:1rem}
.version-timeline::before{content:'';position:absolute;left:.4rem;top:.5rem;bottom:.5rem;width:2px;background:var(--border-md);border-radius:2px}
.version-entry{position:relative;padding:.75rem 0 .75rem .75rem;margin-bottom:.25rem}
.version-entry::before{content:'';position:absolute;left:-.85rem;top:1.05rem;width:10px;height:10px;border-radius:50%;background:var(--white);border:2px solid var(--clay)}
.version-entry.latest::before{background:var(--clay)}
.version-num{font-size:.75rem;font-weight:700;color:var(--clay);margin-bottom:.1rem}
.version-date{font-size:.6875rem;color:var(--fog)}
.version-who{font-size:.6875rem;color:var(--smoke);background:var(--sand-dark);padding:.1rem .45rem;border-radius:100px}
.version-notes{font-size:.8125rem;color:var(--kiln);margin-top:.35rem;line-height:1.5}
.version-files{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.version-file-tag{font-size:.7rem;color:var(--clay-dark);background:var(--clay-light);padding:.15rem .5rem;border-radius:100px;text-decoration:none}
.version-file-tag:hover{text-decoration:underline}

/* RELEASES */
.release-list{display:flex;flex-direction:column;gap:1rem;margin-bottom:1rem}
.release-card{background:var(--sand);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.release-card-header{display:flex;align-items:flex-start;gap:1rem;padding:1rem 1.25rem;cursor:pointer}
.release-thumb{width:72px;height:72px;border-radius:var(--radius-md);object-fit:cover;flex-shrink:0;background:var(--sand-dark)}
.release-thumb-placeholder{width:72px;height:72px;border-radius:var(--radius-md);background:var(--sand-dark);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--fog);font-size:1.5rem}
.release-info{flex:1;min-width:0}
.release-name{font-family:var(--font-display);font-size:1rem;color:var(--kiln);margin-bottom:.25rem}
.release-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;font-size:.75rem;color:var(--smoke)}
.release-body{display:none;border-top:1px solid var(--border);padding:1.25rem}
.release-card.open .release-body{display:block}
.release-card.open .rel-chevron{transform:rotate(180deg)}
.rel-chevron{color:var(--fog);transition:transform .2s;flex-shrink:0;margin-top:.25rem}

/* COMPONENT VERSION ROW IN RELEASE */
.comp-version-row{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;background:var(--white);border-radius:var(--radius-sm);margin-bottom:.35rem;font-size:.8125rem}
.comp-version-row .comp-name{flex:1;font-weight:500;color:var(--kiln)}
.comp-version-row .comp-ver{color:var(--clay);font-weight:600;font-size:.8rem}
.comp-version-row .comp-unchanged{color:var(--fog);font-size:.8rem;font-style:italic}

/* FEEDBACK */
.feedback-item{background:var(--white);border-radius:var(--radius-sm);padding:.65rem .875rem;margin-bottom:.4rem;border-left:3px solid var(--border-md);position:relative}
.feedback-item.status-pending{border-left-color:var(--amber)}
.feedback-item.status-addressed{border-left-color:var(--green)}
.feedback-item.status-wontfix{border-left-color:var(--fog)}
.feedback-item .fb-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem;flex-wrap:wrap}
.feedback-item .fb-text{font-size:.8125rem;color:var(--kiln);line-height:1.5}
.feedback-item .fb-resolution{font-size:.75rem;color:var(--green);margin-top:.2rem}
.fb-status-badge{padding:.1rem .5rem;border-radius:100px;font-size:.65rem;font-weight:600}
.fb-status-badge.pending{background:var(--amber-light);color:var(--amber)}
.fb-status-badge.addressed{background:var(--green-light);color:var(--green)}
.fb-status-badge.wontfix{background:#EEECEA;color:#6B6360}

/* PROTOTYPE COSTS */
.proto-cost-table{width:100%;border-collapse:collapse;font-size:.8125rem;margin-bottom:.5rem}
.proto-cost-table th{text-align:left;font-size:.6875rem;text-transform:uppercase;letter-spacing:.07em;color:var(--fog);padding:.35rem .5rem;border-bottom:1px solid var(--border);font-weight:500}
.proto-cost-table td{padding:.45rem .5rem;border-bottom:1px solid var(--border);color:var(--kiln)}
.proto-cost-table tr:last-child td{border-bottom:none}
.proto-cost-total{font-weight:600;color:var(--clay)}

/* TIMELINE */
.timeline-wrap{padding:.5rem 0}
.tl-entry{display:flex;gap:1rem;margin-bottom:1.5rem;position:relative}
.tl-entry::before{content:'';position:absolute;left:1.4rem;top:2.5rem;bottom:-1.5rem;width:2px;background:var(--border-md)}
.tl-entry:last-child::before{display:none}
.tl-dot{width:2.875rem;height:2.875rem;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;border:2px solid var(--border-md);background:var(--white);color:var(--smoke);z-index:1}
.tl-dot.dot-release{background:var(--clay);border-color:var(--clay);color:var(--white)}
.tl-dot.dot-final{background:var(--green);border-color:var(--green);color:var(--white)}
.tl-dot.dot-feedback{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
.tl-content{flex:1;min-width:0;padding-top:.35rem}
.tl-title{font-size:.9rem;font-weight:500;color:var(--kiln);margin-bottom:.2rem}
.tl-date{font-size:.6875rem;color:var(--fog);margin-bottom:.35rem}
.tl-body{font-size:.8125rem;color:var(--smoke);line-height:1.55}
.tl-thumb{width:80px;height:60px;border-radius:var(--radius-sm);object-fit:cover;margin-top:.5rem;display:block}
.tl-chips{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}

/* FORMS */
.stacked-form{display:flex;flex-direction:column;gap:.6rem}
.stacked-form input,.stacked-form textarea,.stacked-form select{font-family:var(--font-body);font-size:.8125rem;padding:.6rem .75rem;border:1px solid var(--border-md);border-radius:var(--radius-md);background:var(--white);color:var(--kiln);outline:none;transition:border-color .2s;width:100%}
.stacked-form input:focus,.stacked-form textarea:focus,.stacked-form select:focus{border-color:var(--clay)}
.stacked-form textarea{resize:none;min-height:70px;line-height:1.5}
.stacked-form .form-row-label{font-size:.6875rem;text-transform:uppercase;letter-spacing:.07em;color:var(--fog);margin-bottom:.2rem}
.stacked-form .field-group{display:flex;flex-direction:column}
.stacked-form .form-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:.25rem}
.stacked-form .two-col-form{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
@media(max-width:500px){.stacked-form .two-col-form{grid-template-columns:1fr}}

/* IMAGES */
.pic-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem;margin-bottom:.75rem}
.pic-tile{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);background:var(--sand);cursor:pointer;transition:box-shadow .15s}
.pic-tile:hover{box-shadow:var(--shadow-sm)}
.pic-tile img{width:100%;height:100px;object-fit:cover;display:block}
.pic-tile .pic-tile-label{font-size:.7rem;color:var(--smoke);padding:.3rem .5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pic-lightbox{position:fixed;inset:0;background:rgba(42,36,32,.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:2rem}
.pic-lightbox-inner{background:var(--white);border-radius:var(--radius-xl);max-width:660px;width:100%;max-height:90vh;overflow-y:auto;padding:1.5rem;position:relative}
.pic-lightbox img{width:100%;border-radius:var(--radius-md);display:block}
.pic-lightbox-close{position:absolute;top:1rem;right:1rem;background:var(--sand);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;color:var(--smoke)}
.pic-lightbox-close:hover{background:var(--sand-dark)}
.upload-area{border:2px dashed var(--border-md);border-radius:var(--radius-md);padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--white)}
.upload-area:hover,.upload-area.drag-over{border-color:var(--clay);background:var(--clay-light)}
.upload-area input[type="file"]{display:none}
.upload-area p{font-size:.8125rem;color:var(--smoke);margin-top:.4rem}
.upload-progress{font-size:.8125rem;color:var(--clay);margin-top:.5rem}

/* DATA TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:.8125rem;margin-bottom:.75rem}
.data-table th{text-align:left;font-size:.6875rem;text-transform:uppercase;letter-spacing:.07em;color:var(--fog);padding:.4rem .5rem;border-bottom:1px solid var(--border);font-weight:500}
.data-table td{padding:.5rem .5rem;border-bottom:1px solid var(--border);color:var(--kiln);vertical-align:top}
.data-table tr:last-child td{border-bottom:none}
.data-table .del-btn{background:none;border:none;color:var(--fog);cursor:pointer;font-size:.9rem;padding:0 .25rem}
.data-table .del-btn:hover{color:var(--red)}

/* ITEM CARDS */
.item-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem}
.item-card{background:var(--sand);border-radius:var(--radius-sm);padding:.65rem .875rem;position:relative}
.item-card .item-main{font-size:.875rem;color:var(--kiln);line-height:1.5;word-break:break-word}
.item-card .item-note{font-size:.8rem;color:var(--smoke);margin-top:.25rem}
.item-card .item-meta{font-size:.6875rem;color:var(--fog);margin-top:.2rem}
.item-card .item-link{color:var(--clay);text-decoration:none;font-size:.875rem}
.item-card .item-link:hover{text-decoration:underline}
.item-del{position:absolute;top:.5rem;right:.5rem;background:none;border:none;color:var(--fog);cursor:pointer;font-size:1rem;line-height:1;padding:.1rem .3rem;border-radius:4px}
.item-del:hover{color:var(--red);background:var(--red-light)}

/* MISC */
.add-section{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.add-section-title{font-size:.75rem;font-weight:600;color:var(--smoke);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.06em}
.section-divider{margin:1.25rem 0;border:none;border-top:1px solid var(--border)}
.empty-state{text-align:center;padding:3rem 2rem;color:var(--fog)}
.empty-state .big{font-family:var(--font-display);font-size:1.25rem;color:var(--smoke);margin-bottom:.5rem;font-style:italic}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--kiln);color:var(--white);padding:.65rem 1.25rem;border-radius:100px;font-size:.8125rem;z-index:500;transition:transform .3s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(42,36,32,.45);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-backdrop.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius-xl);width:100%;max-width:580px;max-height:92vh;overflow-y:auto;padding:2rem;box-shadow:var(--shadow-lg);animation:slideUp .2s ease}
.modal-lg{max-width:720px}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal h2{font-family:var(--font-display);font-size:1.5rem;font-weight:400;color:var(--kiln);margin-bottom:1.5rem}
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-size:.6875rem;text-transform:uppercase;letter-spacing:.08em;color:var(--smoke);margin-bottom:.35rem}
.form-row input,.form-row textarea,.form-row select{width:100%;font-family:var(--font-body);font-size:.875rem;padding:.65rem .875rem;autocomplete="off";border:1px solid var(--border-md);border-radius:var(--radius-md);background:var(--sand);color:var(--kiln);outline:none;transition:border-color .2s}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--clay);background:var(--white)}
.form-row textarea{resize:vertical;min-height:80px;line-height:1.55}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.form-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
@media(max-width:640px){.topbar{padding:0 1rem}.main{padding:1rem 1rem 3rem}.form-2col{grid-template-columns:1fr}.search-input{width:140px}.topbar-brand span{display:none}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">The Pottery Toolkit</div>
    <div class="auth-sub">Product Tracker</div>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="new-password" />
    <div class="auth-error" id="auth-error"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="tryLogin()">Enter</button>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="topbar-brand">The Pottery Toolkit <span>Product Tracker</span></div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New idea
    </button>
  </header>
  <main class="main">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="toolbar">
      <div class="filter-pills" id="filter-pills">
        <button class="pill active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="pill" data-filter="Idea" onclick="setFilter('Idea',this)">Idea</button>
        <button class="pill" data-filter="Research" onclick="setFilter('Research',this)">Research</button>
        <button class="pill" data-filter="Prototyping" onclick="setFilter('Prototyping',this)">Prototyping</button>
        <button class="pill" data-filter="Testing" onclick="setFilter('Testing',this)">Testing</button>
        <button class="pill" data-filter="Ready" onclick="setFilter('Ready',this)">Ready to launch</button>
        <button class="pill" data-filter="Paused" onclick="setFilter('Paused',this)">Paused</button>
      </div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Search ideas…" id="search-input" oninput="renderList()" />
      </div>
    </div>
    <div class="ideas-grid" id="ideas-grid"></div>
  </main>
</div>

<!-- MAIN IDEA MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal">
    <h2 id="modal-title">New product idea</h2>
    <input type="hidden" id="modal-id" />
    <div class="form-row"><label>Product name *</label><input type="text" autocomplete="off" id="f-name" placeholder="e.g. Mini Vase Mold Set" /></div>
    <div class="form-row"><label>Category</label><input type="text" autocomplete="off" id="f-category" placeholder="e.g. Wheel tools, Glazing, Kilns…" /></div>
    <div class="form-row"><label>Description</label><textarea autocomplete="off" id="f-description" placeholder="What is this product?"></textarea></div>
    <div class="form-row"><label>Problem it solves</label><textarea autocomplete="off" id="f-problem" placeholder="What potter pain point does this address?"></textarea></div>
    <div class="form-row"><label>Target customer</label><input type="text" autocomplete="off" id="f-customer" placeholder="e.g. Beginner throwers, studio teachers…" /></div>
    <div class="form-2col">
      <div class="form-row"><label>Stage</label>
        <select id="f-stage"><option>Idea</option><option>Research</option><option>Prototyping</option><option>Testing</option><option>Ready</option><option>Paused</option></select>
      </div>
      <div class="form-row"><label>Priority</label>
        <select id="f-priority"><option>High</option><option>Medium</option><option>Low</option></select>
      </div>
    </div>
    <div class="form-row"><label>Tags (comma-separated)</label><input type="text" autocomplete="off" id="f-tags" placeholder="e.g. hardware, beginner-friendly, seasonal" /></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveIdea()">Add idea</button>
    </div>
  </div>
</div>

<!-- COMPONENT MODAL -->
<div class="modal-backdrop" id="comp-modal-backdrop" onclick="if(event.target===this)closeCompModal()">
  <div class="modal">
    <h2 id="comp-modal-title">Add component</h2>
    <input type="hidden" id="comp-idea-id" />
    <input type="hidden" id="comp-edit-idx" />
    <div class="form-row"><label>Component name *</label><input type="text" autocomplete="off" id="cf-name" placeholder="e.g. Vase Form, Cutter, Back Cutter" /></div>
    <div class="form-row"><label>Description</label><textarea autocomplete="off" id="cf-desc" placeholder="What does this component do?" style="min-height:60px"></textarea></div>
    <div class="form-row"><label>Reference image URL (optional)</label><input type="text" autocomplete="off" id="cf-img" placeholder="https://… or leave blank to upload later" /></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeCompModal()">Cancel</button>
      <button class="btn btn-primary" id="comp-save-btn" onclick="saveComponent()">Add component</button>
    </div>
  </div>
</div>

<!-- VERSION MODAL -->
<div class="modal-backdrop" id="ver-modal-backdrop" onclick="if(event.target===this)closeVerModal()">
  <div class="modal">
    <h2 id="ver-modal-title">Log new version</h2>
    <input type="hidden" id="ver-idea-id" />
    <input type="hidden" id="ver-comp-idx" />
    <div id="ver-next-num" style="font-size:.8125rem;color:var(--smoke);margin-bottom:1rem"></div>
    <div class="form-row"><label>Who worked on this?</label><input type="text" autocomplete="off" id="vf-who" placeholder="e.g. Jordan, Chadd, Self" /></div>
    <div class="form-row"><label>What changed?</label><textarea autocomplete="off" id="vf-notes" placeholder="Describe what changed in this version…"></textarea></div>
    <div class="form-row"><label>File reference (optional)</label><input type="text" autocomplete="off" id="vf-file-label" placeholder="File label, e.g. Cutter v3 STL" /></div>
    <div class="form-row"><label>File URL / folder path</label><input type="text" autocomplete="off" id="vf-file-url" placeholder="https://… or MEGA › folder › file" /></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeVerModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveVersion()">Log version</button>
    </div>
  </div>
</div>

<!-- RELEASE MODAL -->
<div class="modal-backdrop" id="rel-modal-backdrop" onclick="if(event.target===this)closeRelModal()">
  <div class="modal modal-lg">
    <h2>New release</h2>
    <input type="hidden" id="rel-idea-id" />
    <div id="rel-auto-name" style="font-size:.8125rem;color:var(--smoke);margin-bottom:1rem"></div>
    <div class="form-row"><label>Release name (optional — auto-generated if blank)</label><input type="text" autocomplete="off" id="rf-name" placeholder="e.g. Jordan testing set, May prototype" /></div>
    <div class="form-row"><label>Status</label>
      <select id="rf-status"><option value="Draft">Draft</option><option value="Testing">Testing</option><option value="Final">Final</option><option value="Archived">Archived</option></select>
    </div>
    <div class="form-row"><label>Release notes</label><textarea autocomplete="off" id="rf-notes" placeholder="What's being tested? Who's involved? Key decisions…"></textarea></div>
    <div class="form-row"><label>Release image URL (optional)</label><input type="text" autocomplete="off" id="rf-img" placeholder="https://… photo or render of this prototype set" /></div>
    <div id="rel-components-section">
      <div style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--smoke);margin-bottom:.75rem">Component versions in this release</div>
      <div id="rel-comp-rows"></div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0"/>
    <div style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--smoke);margin-bottom:.75rem">Prototype costs (optional)</div>
    <div class="form-2col">
      <div class="form-row"><label>Filament used (grams)</label><input type="number" autocomplete="off" id="rf-filament-g" placeholder="0" /></div>
      <div class="form-row"><label>Cost per gram ($)</label><input type="number" autocomplete="off" id="rf-filament-cost" placeholder="0.00" step="0.01" /></div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>Print time (hours)</label><input type="number" autocomplete="off" id="rf-print-hours" placeholder="0" step="0.5" /></div>
      <div class="form-row"><label>Electricity cost per hour ($)</label><input type="number" autocomplete="off" id="rf-elec-cost" placeholder="0.00" step="0.01" /></div>
    </div>
    <div class="form-row"><label>Other prototype costs ($)</label><input type="number" autocomplete="off" id="rf-other-cost" placeholder="0.00" step="0.01" /></div>
    <div class="form-row"><label>Prototype cost notes</label><input type="text" autocomplete="off" id="rf-cost-notes" placeholder="e.g. 2 failed prints, switched to PLA+" /></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeRelModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRelease()">Create release</button>
    </div>
  </div>
</div>

<!-- FEEDBACK MODAL -->
<div class="modal-backdrop" id="fb-modal-backdrop" onclick="if(event.target===this)closeFbModal()">
  <div class="modal">
    <h2>Add feedback</h2>
    <input type="hidden" id="fb-idea-id" />
    <input type="hidden" id="fb-rel-idx" />
    <div class="form-row"><label>Component this applies to</label>
      <select id="fb-comp"><option value="">Whole release / general</option></select>
    </div>
    <div class="form-row"><label>From *</label><input type="text" autocomplete="off" id="fb-from" placeholder="e.g. Sister, Jordan, Self" /></div>
    <div class="form-row"><label>Feedback *</label><textarea autocomplete="off" id="fb-text" placeholder="What was the feedback?"></textarea></div>
    <div class="form-row"><label>Status</label>
      <select id="fb-status"><option value="pending">Pending</option><option value="addressed">Addressed</option><option value="wontfix">Won't fix</option></select>
    </div>
    <div class="form-row"><label>Addressed in (if applicable)</label><input type="text" autocomplete="off" id="fb-resolved" placeholder="e.g. Cutter v5, Release 4" /></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeFbModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFeedback()">Add feedback</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL='https://iepwcjilrzkcogcgdtko.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllcHdjamlscnprY29nY2dkdGtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDI3NTcsImV4cCI6MjA5NDc3ODc1N30.YDDjgImimqtXjZMqSN96Jsvg6UNd2Yeu3qTwz3zgW7I';
const APP_PASSWORD='taco1234';
const STORAGE_BUCKET='ideas-files';

const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const STAGES=['Idea','Research','Prototyping','Testing','Ready','Paused'];
const STAGE_PROGRESS={Idea:10,Research:25,Prototyping:50,Testing:75,Ready:100,Paused:0};
const BADGE_CLASS={Idea:'badge-idea',Research:'badge-research',Prototyping:'badge-prototyping',Testing:'badge-testing',Ready:'badge-ready',Paused:'badge-paused'};
const PIP_CLASS={High:'pip-high',Medium:'pip-medium',Low:'pip-low'};

let ideas=[];
let activeFilter='all';
let expandedId=null;
let activeTab={};
let expandedComp={};
let expandedRel={};
const pendingFiles={};

// AUTH
function tryLogin(){
  const pw=document.getElementById('pw-input').value;
  if(pw===APP_PASSWORD){
    sessionStorage.setItem('ptk_auth','1');
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    loadIdeas();
  } else {
    document.getElementById('auth-error').textContent='Incorrect password.';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
if(sessionStorage.getItem('ptk_auth')==='1'){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  loadIdeas();
}

// DATA
async function loadIdeas(){
  document.getElementById('ideas-grid').innerHTML='<div style="padding:3rem;text-align:center;color:var(--fog);font-size:.875rem">Loading…</div>';
  const {data,error}=await db.from('ideas').select('*').order('created_at',{ascending:false});
  if(error){showToast('Error: '+error.message);return;}
  ideas=data||[];
  render();
}

async function saveIdea(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  const btn=document.getElementById('modal-save-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const payload={
    name,
    category:document.getElementById('f-category').value.trim(),
    description:document.getElementById('f-description').value.trim(),
    problem:document.getElementById('f-problem').value.trim(),
    target_customer:document.getElementById('f-customer').value.trim(),
    stage:document.getElementById('f-stage').value,
    priority:document.getElementById('f-priority').value,
    tags:document.getElementById('f-tags').value.trim(),
  };
  const editId=document.getElementById('modal-id').value;
  let error;
  if(editId){
    ({error}=await db.from('ideas').update(payload).eq('id',editId));
  } else {
    payload.notes=[];payload.components=[];payload.releases=[];
    payload.inspiration_links=[];payload.inspiration_pics=[];
    payload.manufacturers=[];payload.costs=[];payload.pricing=[];
    payload.third_parties=[];payload.file_refs=[];
    ({error}=await db.from('ideas').insert(payload));
  }
  btn.disabled=false;btn.textContent=editId?'Save changes':'Add idea';
  if(error){showToast('Error: '+error.message);return;}
  showToast(editId?'Idea updated':'Idea added');
  closeModal();
  await loadIdeas();
}

async function patchIdea(id,patch){
  const {error}=await db.from('ideas').update(patch).eq('id',id);
  if(error){showToast('Error saving');return false;}
  const idea=ideas.find(i=>i.id===id);
  if(idea)Object.assign(idea,patch);
  return true;
}

async function uploadImage(ideaId,file){
  const ext=file.name.split('.').pop();
  const path=`${ideaId}/${Date.now()}.${ext}`;
  const {data,error}=await db.storage.from(STORAGE_BUCKET).upload(path,file,{upsert:false});
  if(error){showToast('Upload error: '+error.message);return null;}
  const {data:urlData}=db.storage.from(STORAGE_BUCKET).getPublicUrl(path);
  return urlData.publicUrl;
}

// RENDER
function render(){renderStats();renderList();}

function renderStats(){
  const t=ideas.length;
  const ip=ideas.filter(i=>['Prototyping','Testing'].includes(i.stage)).length;
  const rd=ideas.filter(i=>i.stage==='Ready').length;
  const hi=ideas.filter(i=>i.priority==='High').length;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card" onclick="setStatFilter('all')" id="stat-all"><div class="stat-num">${t}</div><div class="stat-label">Total ideas</div></div>
    <div class="stat-card" onclick="setStatFilter('inprogress')" id="stat-inprogress"><div class="stat-num">${ip}</div><div class="stat-label">In progress</div></div>
    <div class="stat-card" onclick="setStatFilter('Ready')" id="stat-ready"><div class="stat-num">${rd}</div><div class="stat-label">Ready to launch</div></div>
    <div class="stat-card" onclick="setStatFilter('highpri')" id="stat-highpri"><div class="stat-num">${hi}</div><div class="stat-label">High priority</div></div>`;
}

function setStatFilter(f){
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active-stat'));
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  const card=document.getElementById('stat-'+f);
  if(card)card.classList.add('active-stat');
  if(f==='all'){activeFilter='all';document.querySelector('[data-filter="all"]').classList.add('active');}
  else if(f==='inprogress')activeFilter='inprogress';
  else if(f==='Ready'){activeFilter='Ready';document.querySelector('[data-filter="Ready"]').classList.add('active');}
  else if(f==='highpri')activeFilter='highpri';
  renderList();
}

function renderList(){
  const q=document.getElementById('search-input').value.toLowerCase();
  let filtered=ideas;
  if(activeFilter==='inprogress')filtered=filtered.filter(i=>['Prototyping','Testing'].includes(i.stage));
  else if(activeFilter==='highpri')filtered=filtered.filter(i=>i.priority==='High');
  else if(activeFilter!=='all')filtered=filtered.filter(i=>i.stage===activeFilter);
  if(q)filtered=filtered.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)||(i.tags||'').toLowerCase().includes(q));
  const el=document.getElementById('ideas-grid');
  if(!filtered.length){el.innerHTML='<div class="empty-state"><div class="big">Nothing here yet</div><p>Add your first product idea using the button above.</p></div>';return;}
  el.innerHTML=filtered.map(idea=>ideaCardHTML(idea)).join('');
}

function ideaCardHTML(idea){
  const isOpen=expandedId===idea.id;
  const tab=activeTab[idea.id]||'overview';
  const progress=STAGE_PROGRESS[idea.stage]||0;
  const tags=(idea.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const components=idea.components||[];
  const releases=idea.releases||[];
  const fmtDate=iso=>iso?new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
  const fmtDT=iso=>iso?new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';

  // OVERVIEW TAB
  const overviewTab=`
    <div class="two-col" style="margin-bottom:1rem">
      <div><div class="field-label">Description</div><div class="field-value ${!idea.description?'empty':''}">${idea.description?esc(idea.description):'Not specified'}</div></div>
      <div><div class="field-label">Problem it solves</div><div class="field-value ${!idea.problem?'empty':''}">${idea.problem?esc(idea.problem):'Not specified'}</div></div>
      <div><div class="field-label">Target customer</div><div class="field-value ${!idea.target_customer?'empty':''}">${idea.target_customer?esc(idea.target_customer):'Not specified'}</div></div>
      <div><div class="field-label">Tags</div>${tags.length?`<div class="tags-row">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:'<div class="field-value empty">None</div>'}</div>
    </div>
    <div class="progress-wrap">
      <div class="field-label">Progress — ${idea.stage}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="add-section">
      <div class="add-section-title">Notes & updates</div>
      <div class="item-list">
        ${(idea.notes||[]).length?(idea.notes||[]).map((n,i)=>`
          <div class="item-card">
            <button class="item-del" onclick="deleteArrayItem('${idea.id}','notes',${i})">×</button>
            <div class="item-main">${esc(n.text)}</div>
            <div class="item-meta">${fmtDT(n.date)}</div>
          </div>`).join(''):'<div class="field-value empty" style="margin-bottom:.5rem">No notes yet.</div>'}
      </div>
      <div class="stacked-form">
        <textarea autocomplete="off" id="note-ta-${idea.id}" placeholder="Add a note or update…" rows="2" onclick="event.stopPropagation()"></textarea>
        <div class="form-actions"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();addNote('${idea.id}')">Add note</button></div>
      </div>
    </div>`;

  // COMPONENTS TAB
  const componentsTab=`
    <div class="component-list">
      ${components.length?components.map((c,ci)=>{
        const isCompOpen=expandedComp[idea.id+'_'+ci];
        const versions=c.versions||[];
        const latestVer=versions[0];
        return `
        <div class="component-card ${isCompOpen?'open':''}" id="comp-${idea.id}-${ci}">
          <div class="component-header" onclick="event.stopPropagation();toggleComp('${idea.id}',${ci})">
            ${c.img?`<img src="${esc(c.img)}" class="component-img" onerror="this.style.display='none'" />`:`<div class="component-img-placeholder">⬡</div>`}
            <div class="component-info">
              <div class="component-name">${esc(c.name)}</div>
              <div class="component-meta">
                ${c.final?'<span class="final-badge">✓ Final</span>':'<span style="color:var(--fog);font-size:.75rem">In progress</span>'}

// TIMELINE BUILDER
function buildTimeline(idea, fmtDate) {
  const releases=idea.releases||[];
  const components=idea.components||[];
  if(!releases.length&&!components.some(c=>c.versions&&c.versions.length)){
    return '<div class="field-value empty" style="padding:2rem 0;text-align:center">Add components and releases to see the timeline.</div>';
  }

  // Build events list
  const events=[];
  releases.forEach((r,ri)=>{
    events.push({type:'release',date:r.date||'',data:r,idx:ri});
    (r.feedback||[]).forEach((fb,fi)=>{
      events.push({type:'feedback',date:r.date||'',data:fb,relIdx:ri,fbIdx:fi});
    });
  });
  components.forEach((c,ci)=>{
    (c.versions||[]).forEach((v,vi)=>{
      events.push({type:'version',date:v.date||'',data:v,comp:c,compIdx:ci,verIdx:vi});
    });
  });
  events.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));

  if(!events.length) return '<div class="field-value empty" style="padding:2rem 0;text-align:center">No history yet.</div>';

  return `<div class="timeline-wrap">${events.map(ev=>{
    if(ev.type==='release'){
      const r=ev.data;
      const protoCost=calcProtoCost(r);
      const pendingFb=(r.feedback||[]).filter(f=>f.status==='pending').length;
      return `
      <div class="tl-entry">
        <div class="tl-dot ${r.status==='Final'?'dot-final':'dot-release'}">${r.num||'R'}</div>
        <div class="tl-content">
          <div class="tl-title">${esc(r.name||'Release '+r.num)}</div>
          <div class="tl-date">${fmtDate(r.date)}</div>
          <div class="tl-chips">
            <span class="badge ${r.status==='Final'?'badge-ready':r.status==='Testing'?'badge-testing':'badge-draft'}">${r.status||'Draft'}</span>
            ${protoCost>0?`<span class="tag">Proto cost: $${protoCost.toFixed(2)}</span>`:''}
            ${pendingFb>0?`<span class="tag" style="background:var(--amber-light);color:var(--amber)">${pendingFb} open feedback</span>`:''}
          </div>
          ${r.notes?`<div class="tl-body" style="margin-top:.4rem">${esc(r.notes)}</div>`:''}
          ${(r.compVersions||[]).length?`<div class="tl-body" style="margin-top:.4rem">${r.compVersions.map(cv=>`<span style="margin-right:.75rem"><strong>${esc(cv.compName)}</strong> ${cv.unchanged?'<span style="color:var(--fog)">unchanged</span>':`<span style="color:var(--clay)">v${esc(cv.version)}</span>`}</span>`).join('')}</div>`:''}
          ${r.img?`<img src="${esc(r.img)}" class="tl-thumb" onerror="this.style.display='none'" />`:''}
        </div>
      </div>`;
    } else if(ev.type==='version'){
      const v=ev.data;const c=ev.comp;
      return `
      <div class="tl-entry">
        <div class="tl-dot" style="font-size:.65rem">v${esc(v.num)}</div>
        <div class="tl-content">
          <div class="tl-title">${esc(c.name)} — v${esc(v.num)}</div>
          <div class="tl-date">${fmtDate(v.date)}${v.who?` · ${esc(v.who)}`:''}</div>
          ${v.notes?`<div class="tl-body">${esc(v.notes)}</div>`:''}
          ${v.fileLabel||v.fileUrl?`<div class="tl-chips"><a href="${esc(v.fileUrl||'#')}" target="_blank" class="version-file-tag">📎 ${esc(v.fileLabel||'File')}</a></div>`:''}
        </div>
      </div>`;
    } else {
      const fb=ev.data;
      return `
      <div class="tl-entry">
        <div class="tl-dot dot-feedback" style="font-size:.7rem">FB</div>
        <div class="tl-content">
          <div class="tl-title">Feedback${fb.compName?' on '+esc(fb.compName):''}</div>
          <div class="tl-date">from ${esc(fb.from)}</div>
          <div class="tl-body">${esc(fb.text)}</div>
          <div class="tl-chips"><span class="fb-status-badge ${fb.status||'pending'}">${fb.status==='addressed'?'Addressed':fb.status==='wontfix'?"Won't fix":'Pending'}</span>${fb.resolved?`<span style="font-size:.75rem;color:var(--green)">✓ ${esc(fb.resolved)}</span>`:''}</div>
        </div>
      </div>`;
    }
  }).join('')}</div>`;
}

// HELPERS
function calcProtoCost(r){
  let total=0;
  if(r.filamentG&&r.filamentCostPer)total+=parseFloat(r.filamentG)*parseFloat(r.filamentCostPer);
  if(r.printHours&&r.elecCostPer)total+=parseFloat(r.printHours)*parseFloat(r.elecCostPer);
  if(r.otherCost)total+=parseFloat(r.otherCost);
  return total;
}

function calcMargin(unitTotal,price){
  if(!unitTotal||!price)return '—';
  return ((parseFloat(price)-unitTotal)/parseFloat(price)*100).toFixed(0)+'%';
}

function bumpVersion(v){
  const parts=String(v||'1.0').split('.');
  const minor=parseInt(parts[1]||0)+1;
  if(minor>9)return (parseInt(parts[0]||1)+1)+'.0';
  return parts[0]+'.'+minor;
}

function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function updateMultiplierPrice(id){
  const sel=document.getElementById('multiplier-'+id);
  const result=document.getElementById('multiplier-result-'+id);
  const idea=ideas.find(i=>i.id===id);
  if(!sel||!result||!idea)return;
  const mult=parseFloat(sel.value);
  if(!mult){result.textContent='';return;}
  const unitTotal=(idea.costs||[]).filter(c=>c.type==='unit').reduce((s,c)=>s+parseFloat(c.cost||0),0);
  if(!unitTotal){result.innerHTML='<span style="color:var(--fog)">Add unit costs first</span>';return;}
  const price=(unitTotal*mult).toFixed(2);
  result.innerHTML=`= <strong style="color:var(--clay)">$${price}</strong> <span style="color:var(--fog);font-size:.75rem">(${((mult-1)/mult*100).toFixed(0)}% margin)</span>`;
  document.getElementById('price-amt-'+id).value=price;
}

// IMAGE ACTIONS
function previewImage(id,input){
  const file=input.files[0];if(!file)return;
  pendingFiles[id]=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const preview=document.getElementById('img-preview-'+id);
    const wrap=document.getElementById('img-preview-wrap-'+id);
    if(preview){preview.src=e.target.result;wrap.style.display='block';}
  };
  reader.readAsDataURL(file);
}

function clearImagePreview(id){
  delete pendingFiles[id];
  const wrap=document.getElementById('img-preview-wrap-'+id);
  const input=document.getElementById('img-upload-'+id);
  if(wrap)wrap.style.display='none';
  if(input)input.value='';
}

async function handleDrop(id,event){
  const file=event.dataTransfer.files[0];if(!file)return;
  pendingFiles[id]=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const preview=document.getElementById('img-preview-'+id);
    const wrap=document.getElementById('img-preview-wrap-'+id);
    if(preview){preview.src=e.target.result;wrap.style.display='block';}
  };
  reader.readAsDataURL(file);
}

  const file=pendingFiles[id];

  const label=document.getElementById('pic-label-'+id).value.trim();
  const note=document.getElementById('pic-note-'+id).value.trim();
  const idea=ideas.find(i=>i.id===id);
  const inspiration_pics=[...(idea.inspiration_pics||[]),{url,label,note}];
  if(await patchIdea(id,{inspiration_pics})){delete pendingFiles[id];if(status)status.style.display='none';renderList();showToast('Image uploaded');}
}

  const note=document.getElementById('pic-note-'+id).value.trim();
  const idea=ideas.find(i=>i.id===id);
  const inspiration_pics=[...(idea.inspiration_pics||[]),{url,label,note}];
  if(await patchIdea(id,{inspiration_pics})){renderList();showToast('Image added');}
}

function openLightbox(ideaId,picIdx){
  const idea=ideas.find(i=>i.id===ideaId);
  const p=(idea.inspiration_pics||[])[picIdx];if(!p)return;
  const lb=document.createElement('div');
  lb.className='pic-lightbox';
  lb.innerHTML=`
    <div class="pic-lightbox-inner" onclick="event.stopPropagation()">
      <button class="pic-lightbox-close" onclick="document.body.removeChild(this.closest('.pic-lightbox'))">×</button>
      <img src="${esc(p.url)}" alt="${esc(p.label||'')}" />
      <div style="margin-top:1rem">
        <div style="font-size:.6875rem;text-transform:uppercase;letter-spacing:.08em;color:var(--fog);margin-bottom:.3rem">Label</div>
        <input id="lb-label-${ideaId}-${picIdx}" type="text" value="${esc(p.label||'')}" placeholder="Add a label…" style="width:100%;font-family:var(--font-body);font-size:.875rem;padding:.55rem .75rem;border:1px solid var(--border-md);border-radius:var(--radius-md);background:var(--sand);color:var(--kiln);outline:none;margin-bottom:.75rem" />
        <div style="font-size:.6875rem;text-transform:uppercase;letter-spacing:.08em;color:var(--fog);margin-bottom:.3rem">Notes</div>
        <textarea autocomplete="off" id="lb-note-${ideaId}-${picIdx}" placeholder="Add notes…" style="width:100%;font-family:var(--font-body);font-size:.875rem;padding:.55rem .75rem;border:1px solid var(--border-md);border-radius:var(--radius-md);background:var(--sand);color:var(--kiln);outline:none;resize:none;min-height:80px;line-height:1.5">${esc(p.note||'')}</textarea>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="saveLightboxEdit('${ideaId}',${picIdx})">Save changes</button>
        <a href="${esc(p.url)}" target="_blank" class="btn btn-ghost btn-sm">↗ Open original</a>
        <button class="btn btn-danger btn-sm" onclick="document.body.removeChild(this.closest('.pic-lightbox'));deleteArrayItem('${ideaId}','inspiration_pics',${picIdx})">Delete</button>
      </div>
    </div>`;
  lb.addEventListener('click',e=>{if(e.target===lb)document.body.removeChild(lb);});
  document.body.appendChild(lb);
}

async function saveLightboxEdit(ideaId,picIdx){
  const label=document.getElementById('lb-label-'+ideaId+'-'+picIdx).value.trim();
  const note=document.getElementById('lb-note-'+ideaId+'-'+picIdx).value.trim();
  const idea=ideas.find(i=>i.id===ideaId);
  const inspiration_pics=[...(idea.inspiration_pics||[])];
  inspiration_pics[picIdx]={...inspiration_pics[picIdx],label,note};
  if(await patchIdea(ideaId,{inspiration_pics})){document.body.removeChild(document.querySelector('.pic-lightbox'));renderList();showToast('Image updated');}
}

// ARRAY ACTIONS
async function addNote(id){
  const ta=document.getElementById('note-ta-'+id);
  const text=ta.value.trim();if(!text)return;
  const idea=ideas.find(i=>i.id===id);
  const notes=[...(idea.notes||[]),{text,date:new Date().toISOString()}];
  if(await patchIdea(id,{notes})){ta.value='';renderList();showToast('Note added');}
}

async function addInspirationLink(id){
  const url=document.getElementById('link-url-'+id).value.trim();if(!url)return;
  const label=document.getElementById('link-label-'+id).value.trim();
  const note=document.getElementById('link-note-'+id).value.trim();
  const idea=ideas.find(i=>i.id===id);
  const inspiration_links=[...(idea.inspiration_links||[]),{url,label,note}];
  if(await patchIdea(id,{inspiration_links})){renderList();showToast('Link added');}
}

async function addCost(id,type){
  const item=document.getElementById('cost-'+type+'-item-'+id).value.trim();
  const cost=document.getElementById('cost-'+type+'-amt-'+id).value.trim();
  if(!item||!cost)return;
  const note=document.getElementById('cost-'+type+'-note-'+id).value.trim();
  const idea=ideas.find(i=>i.id===id);
  const costs=[...(idea.costs||[]),{item,cost,note,type}];
  if(await patchIdea(id,{costs})){renderList();showToast('Cost added');}
}

async function addPricing(id){
  const tier=document.getElementById('price-tier-'+id).value.trim();
  const price=document.getElementById('price-amt-'+id).value.trim();
  if(!tier||!price)return;
  const note=document.getElementById('price-note-'+id).value.trim();
  const idea=ideas.find(i=>i.id===id);
  const pricing=[...(idea.pricing||[]),{tier,price,note}];
  if(await patchIdea(id,{pricing})){renderList();showToast('Pricing added');}
}

async function addManufacturer(id){
  const name=document.getElementById('mfr-name-'+id).value.trim();if(!name)return;
  const idea=ideas.find(i=>i.id===id);
  const manufacturers=[...(idea.manufacturers||[]),{
    name,location:document.getElementById('mfr-loc-'+id).value.trim(),
    contact:document.getElementById('mfr-contact-'+id).value.trim(),
    url:document.getElementById('mfr-url-'+id).value.trim(),
    note:document.getElementById('mfr-note-'+id).value.trim()
  }];
  if(await patchIdea(id,{manufacturers})){renderList();showToast('Manufacturer added');}
}

async function addThirdParty(id){
  const role=document.getElementById('tp-role-'+id).value.trim();if(!role)return;
  const idea=ideas.find(i=>i.id===id);
  const third_parties=[...(idea.third_parties||[]),{
    role,name:document.getElementById('tp-name-'+id).value.trim(),
    note:document.getElementById('tp-note-'+id).value.trim()
  }];
  if(await patchIdea(id,{third_parties})){renderList();showToast('Third party added');}
}

async function addFileRef(id){
  const label=document.getElementById('fref-label-'+id).value.trim();if(!label)return;
  const idea=ideas.find(i=>i.id===id);
  const file_refs=[...(idea.file_refs||[]),{
    label,type:document.getElementById('fref-type-'+id).value,
    url:document.getElementById('fref-url-'+id).value.trim(),
    location:document.getElementById('fref-loc-'+id).value.trim(),
    note:document.getElementById('fref-note-'+id).value.trim()
  }];
  if(await patchIdea(id,{file_refs})){renderList();showToast('File reference added');}
}

async function deleteArrayItem(id,field,idx){
  const idea=ideas.find(i=>i.id===id);
  const arr=(idea[field]||[]).filter((_,i)=>i!==idx);
  if(await patchIdea(id,{[field]:arr})){renderList();showToast('Removed');}
}

async function updateField(id,field,value){
  if(await patchIdea(id,{[field]:value})){render();showToast('Saved');}
}

async function deleteIdea(id){
  if(!confirm('Delete this idea? This cannot be undone.'))return;
  const {error}=await db.from('ideas').delete().eq('id',id);
  if(error){showToast('Error: '+error.message);return;}
  ideas=ideas.filter(i=>i.id!==id);
  if(expandedId===id)expandedId=null;
  render();showToast('Idea deleted');
}

// UI
function toggleCard(id){expandedId=expandedId===id?null:id;if(!activeTab[id])activeTab[id]='overview';renderList();}
function setTab(id,tab){activeTab[id]=tab;renderList();}
function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active-stat'));
  el.classList.add('active');
  renderList();
}

function openModal(){
  document.getElementById('modal-title').textContent='New product idea';
  document.getElementById('modal-id').value='';
  document.getElementById('modal-save-btn').textContent='Add idea';
  ['name','category','description','problem','customer','tags'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('f-stage').value='Idea';
  document.getElementById('f-priority').value='Medium';
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),50);
}

function openEditModal(id){
  const idea=ideas.find(i=>i.id===id);if(!idea)return;
  document.getElementById('modal-title').textContent='Edit idea';
  document.getElementById('modal-id').value=id;
  document.getElementById('modal-save-btn').textContent='Save changes';
  document.getElementById('f-name').value=idea.name||'';
  document.getElementById('f-category').value=idea.category||'';
  document.getElementById('f-description').value=idea.description||'';
  document.getElementById('f-problem').value=idea.problem||'';
  document.getElementById('f-customer').value=idea.target_customer||'';
  document.getElementById('f-stage').value=idea.stage||'Idea';
  document.getElementById('f-priority').value=idea.priority||'Medium';
  document.getElementById('f-tags').value=idea.tags||'';
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal(){document.getElementById('modal-backdrop').classList.remove('open');}
function handleBackdropClick(e){if(e.target===document.getElementById('modal-backdrop'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeCompModal();closeVerModal();closeRelModal();closeFbModal();}});

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
