<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Pottery Toolkit — Product Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --clay:#C4714A; --clay-hover:#B0603C; --clay-light:#F7EDE6; --clay-dark:#7A3F22;
  --sand:#F5F0EB; --sand-dark:#E8DDD3; --kiln:#2A2420; --smoke:#6B6360; --fog:#A8A29E;
  --white:#FFFFFF; --border:rgba(42,36,32,0.12); --border-md:rgba(42,36,32,0.22);
  --shadow-sm:0 1px 3px rgba(42,36,32,0.08); --shadow-lg:0 8px 32px rgba(42,36,32,0.18);
  --radius-sm:6px; --radius-md:10px; --radius-lg:16px; --radius-xl:24px;
  --font-display:'DM Serif Display',Georgia,serif; --font-body:'DM Sans',system-ui,sans-serif;
}
body { font-family:var(--font-body); background:var(--sand); color:var(--kiln); min-height:100vh; line-height:1.6; }

#auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
.auth-card { background:var(--white); border-radius:var(--radius-xl); padding:3rem 2.5rem; width:100%; max-width:380px; box-shadow:var(--shadow-lg); border:1px solid var(--border); text-align:center; }
.auth-logo { font-family:var(--font-display); font-size:1.75rem; color:var(--kiln); margin-bottom:0.25rem; }
.auth-sub { font-size:0.8125rem; color:var(--smoke); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:2rem; }
.auth-card input[type="password"] { width:100%; padding:0.75rem 1rem; font-family:var(--font-body); font-size:1rem; border:1.5px solid var(--border-md); border-radius:var(--radius-md); background:var(--sand); color:var(--kiln); outline:none; transition:border-color 0.2s; text-align:center; letter-spacing:0.15em; margin-bottom:1rem; }
.auth-card input[type="password"]:focus { border-color:var(--clay); }
.auth-error { font-size:0.8125rem; color:#B94444; margin-bottom:0.75rem; min-height:1.2rem; }

#app { display:none; min-height:100vh; }
.topbar { background:var(--white); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:50; }
.topbar-brand { font-family:var(--font-display); font-size:1.25rem; color:var(--kiln); display:flex; align-items:center; gap:0.5rem; }
.topbar-brand span { font-family:var(--font-body); font-size:0.75rem; color:var(--fog); font-weight:400; letter-spacing:0.06em; text-transform:uppercase; border-left:1px solid var(--border-md); padding-left:0.75rem; margin-left:0.25rem; }
.main { max-width:1100px; margin:0 auto; padding:2rem 2rem 4rem; }

.btn { display:inline-flex; align-items:center; gap:0.4rem; font-family:var(--font-body); font-size:0.8125rem; font-weight:500; cursor:pointer; border:none; border-radius:var(--radius-md); padding:0.5rem 1rem; transition:all 0.15s; white-space:nowrap; }
.btn-primary { background:var(--clay); color:var(--white); }
.btn-primary:hover { background:var(--clay-hover); }
.btn-ghost { background:transparent; color:var(--smoke); border:1px solid var(--border-md); }
.btn-ghost:hover { background:var(--sand); color:var(--kiln); }
.btn-danger { background:transparent; color:#B94444; border:1px solid rgba(185,68,68,0.3); }
.btn-danger:hover { background:rgba(185,68,68,0.07); }
.btn-sm { padding:0.3rem 0.65rem; font-size:0.75rem; }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:0.75rem; margin-bottom:2rem; }
.stat-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem 1.5rem; cursor:pointer; transition:all 0.15s; }
.stat-card:hover { border-color:var(--clay); box-shadow:var(--shadow-sm); }
.stat-card.active-stat { border-color:var(--clay); background:var(--clay-light); }
.stat-num { font-family:var(--font-display); font-size:2.25rem; color:var(--kiln); line-height:1; margin-bottom:0.25rem; }
.stat-label { font-size:0.75rem; color:var(--smoke); text-transform:uppercase; letter-spacing:0.07em; }

.toolbar { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:1.25rem; flex-wrap:wrap; }
.filter-pills { display:flex; gap:0.4rem; flex-wrap:wrap; }
.pill { padding:0.3rem 0.875rem; border-radius:100px; font-size:0.75rem; font-weight:500; border:1px solid var(--border-md); background:var(--white); color:var(--smoke); cursor:pointer; transition:all 0.15s; font-family:var(--font-body); }
.pill:hover { border-color:var(--clay); color:var(--clay); }
.pill.active { background:var(--clay); color:var(--white); border-color:var(--clay); }
.search-wrap { position:relative; flex-shrink:0; }
.search-wrap svg { position:absolute; left:0.65rem; top:50%; transform:translateY(-50%); color:var(--fog); pointer-events:none; }
.search-input { padding:0.45rem 0.75rem 0.45rem 2rem; font-family:var(--font-body); font-size:0.8125rem; border:1px solid var(--border-md); border-radius:var(--radius-md); background:var(--white); color:var(--kiln); width:200px; outline:none; transition:border-color 0.2s; }
.search-input:focus { border-color:var(--clay); }
.search-input::placeholder { color:var(--fog); }

.ideas-grid { display:flex; flex-direction:column; gap:0.75rem; }
.idea-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; transition:box-shadow 0.2s,border-color 0.2s; }
.idea-card:hover { box-shadow:var(--shadow-sm); }
.idea-card.open { border-color:var(--clay); }
.idea-card-header { display:flex; align-items:center; gap:0.875rem; padding:1rem 1.25rem; cursor:pointer; user-select:none; }
.priority-pip { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.pip-high{background:#D94F4F;} .pip-medium{background:#E09A2B;} .pip-low{background:#5A9A5A;}
.idea-main { flex:1; min-width:0; }
.idea-name-row { display:flex; align-items:center; gap:0.5rem; }
.idea-name { font-size:0.9375rem; font-weight:500; color:var(--kiln); }
.edit-name-btn { background:none; border:none; color:var(--fog); cursor:pointer; padding:0.15rem 0.3rem; border-radius:4px; font-size:0.75rem; transition:all 0.15s; display:flex; align-items:center; }
.edit-name-btn:hover { color:var(--clay); background:var(--clay-light); }
.idea-chips { display:flex; align-items:center; gap:0.5rem; margin-top:0.25rem; flex-wrap:wrap; }
.badge { display:inline-block; padding:0.15rem 0.6rem; border-radius:100px; font-size:0.6875rem; font-weight:500; }
.badge-idea{background:#E3EEFF;color:#2255B8;} .badge-research{background:#FEF3DC;color:#8A5E00;}
.badge-prototyping{background:#EDE9FE;color:#5B3EC5;} .badge-testing{background:#E2F5E9;color:#1E7D40;}
.badge-ready{background:#D9F5EF;color:#0D6B55;} .badge-paused{background:#EEECEA;color:#6B6360;}
.cat-chip { font-size:0.6875rem; color:var(--smoke); background:var(--sand); padding:0.15rem 0.55rem; border-radius:100px; }
.chevron { color:var(--fog); flex-shrink:0; transition:transform 0.2s; }
.idea-card.open .chevron { transform:rotate(180deg); }

.idea-body { display:none; border-top:1px solid var(--border); }
.idea-card.open .idea-body { display:block; }
.tab-bar { display:flex; border-bottom:1px solid var(--border); padding:0 1.25rem; overflow-x:auto; }
.tab-btn { padding:0.65rem 1rem; font-size:0.8rem; font-weight:500; color:var(--fog); border:none; background:none; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap; font-family:var(--font-body); transition:all 0.15s; }
.tab-btn:hover { color:var(--smoke); }
.tab-btn.active { color:var(--clay); border-bottom-color:var(--clay); }
.tab-panel { display:none; padding:1.25rem; }
.tab-panel.active { display:block; }

.field-label { font-size:0.6875rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--fog); margin-bottom:0.3rem; }
.field-value { font-size:0.875rem; color:var(--kiln); line-height:1.55; }
.field-value.empty { color:var(--fog); font-style:italic; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
@media(max-width:600px) { .two-col { grid-template-columns:1fr; } }

.progress-wrap { margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border); }
.progress-track { height:6px; background:var(--sand-dark); border-radius:100px; margin-top:0.5rem; overflow:hidden; }
.progress-fill { height:100%; background:var(--clay); border-radius:100px; transition:width 0.4s ease; }

.tags-row { display:flex; flex-wrap:wrap; gap:0.4rem; }
.tag { padding:0.2rem 0.6rem; border-radius:100px; font-size:0.6875rem; background:var(--clay-light); color:var(--clay-dark); font-weight:500; }

.card-controls { display:flex; gap:0.5rem; padding:0.875rem 1.25rem; border-top:1px solid var(--border); flex-wrap:wrap; align-items:center; background:var(--sand); }
.inline-select { font-family:var(--font-body); font-size:0.8125rem; padding:0.35rem 0.6rem; border:1px solid var(--border-md); border-radius:var(--radius-sm); background:var(--white); color:var(--kiln); cursor:pointer; outline:none; }
.spacer { flex:1; }
.meta-date { font-size:0.6875rem; color:var(--fog); align-self:center; }

.version-item { background:var(--sand); border-radius:var(--radius-sm); padding:0.75rem 1rem; border-left:3px solid var(--clay); margin-bottom:0.5rem; }
.version-header { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.25rem; }
.version-num { font-size:0.75rem; font-weight:600; color:var(--clay); }
.version-date { font-size:0.6875rem; color:var(--fog); }
.version-text { font-size:0.875rem; color:var(--kiln); line-height:1.5; }

.item-list { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:0.75rem; }
.item-card { background:var(--sand); border-radius:var(--radius-sm); padding:0.65rem 0.875rem; position:relative; }
.item-card .item-main { font-size:0.875rem; color:var(--kiln); line-height:1.5; word-break:break-word; }
.item-card .item-note { font-size:0.8rem; color:var(--smoke); margin-top:0.25rem; }
.item-card .item-meta { font-size:0.6875rem; color:var(--fog); margin-top:0.2rem; }
.item-card .item-link { color:var(--clay); text-decoration:none; font-size:0.875rem; }
.item-card .item-link:hover { text-decoration:underline; }
.item-del { position:absolute; top:0.5rem; right:0.5rem; background:none; border:none; color:var(--fog); cursor:pointer; font-size:1rem; line-height:1; padding:0.1rem 0.3rem; border-radius:4px; }
.item-del:hover { color:#B94444; background:rgba(185,68,68,0.08); }

.pic-tiles { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:0.6rem; margin-bottom:0.75rem; }
.pic-tile { border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border); background:var(--sand); cursor:pointer; transition:box-shadow 0.15s; }
.pic-tile:hover { box-shadow:var(--shadow-sm); }
.pic-tile img { width:100%; height:110px; object-fit:cover; display:block; }
.pic-tile .pic-tile-label { font-size:0.7rem; color:var(--smoke); padding:0.3rem 0.5rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pic-lightbox { position:fixed; inset:0; background:rgba(42,36,32,0.85); z-index:300; display:flex; align-items:center; justify-content:center; padding:2rem; }
.pic-lightbox-inner { background:var(--white); border-radius:var(--radius-xl); max-width:700px; width:100%; max-height:90vh; overflow-y:auto; padding:1.5rem; position:relative; }
.pic-lightbox img { width:100%; border-radius:var(--radius-md); display:block; }
.pic-lightbox-label { font-family:var(--font-display); font-size:1.1rem; color:var(--kiln); margin-top:0.75rem; }
.pic-lightbox-note { font-size:0.875rem; color:var(--smoke); margin-top:0.4rem; line-height:1.55; }
.pic-lightbox-close { position:absolute; top:1rem; right:1rem; background:var(--sand); border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; color:var(--smoke); }
.pic-lightbox-close:hover { background:var(--sand-dark); }

.add-section { margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border); }
.add-section-title { font-size:0.75rem; font-weight:600; color:var(--smoke); margin-bottom:0.75rem; text-transform:uppercase; letter-spacing:0.06em; display:flex; align-items:center; justify-content:space-between; }

.stacked-form { display:flex; flex-direction:column; gap:0.6rem; }
.stacked-form input, .stacked-form textarea, .stacked-form select { font-family:var(--font-body); font-size:0.8125rem; padding:0.6rem 0.75rem; border:1px solid var(--border-md); border-radius:var(--radius-md); background:var(--white); color:var(--kiln); outline:none; transition:border-color 0.2s; width:100%; }
.stacked-form input:focus, .stacked-form textarea:focus, .stacked-form select:focus { border-color:var(--clay); }
.stacked-form textarea { resize:none; min-height:70px; line-height:1.5; }
.stacked-form .form-row-label { font-size:0.6875rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--fog); margin-bottom:0.2rem; }
.stacked-form .field-group { display:flex; flex-direction:column; }
.stacked-form .form-actions { display:flex; justify-content:flex-end; gap:0.5rem; margin-top:0.25rem; }

.data-table { width:100%; border-collapse:collapse; font-size:0.8125rem; margin-bottom:0.75rem; }
.data-table th { text-align:left; font-size:0.6875rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--fog); padding:0.4rem 0.5rem; border-bottom:1px solid var(--border); font-weight:500; }
.data-table td { padding:0.5rem 0.5rem; border-bottom:1px solid var(--border); color:var(--kiln); vertical-align:top; }
.data-table tr:last-child td { border-bottom:none; }
.data-table .del-btn { background:none; border:none; color:var(--fog); cursor:pointer; font-size:0.9rem; padding:0 0.25rem; }
.data-table .del-btn:hover { color:#B94444; }

.upload-area { border:2px dashed var(--border-md); border-radius:var(--radius-md); padding:1.5rem; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--white); }
.upload-area:hover { border-color:var(--clay); background:var(--clay-light); }
.upload-area.drag-over { border-color:var(--clay); background:var(--clay-light); transform:scale(1.01); }
.upload-area input[type="file"] { display:none; }
.upload-area p { font-size:0.8125rem; color:var(--smoke); margin-top:0.4rem; }
.upload-progress { font-size:0.8125rem; color:var(--clay); margin-top:0.5rem; }

.modal-backdrop { display:none; position:fixed; inset:0; background:rgba(42,36,32,0.45); z-index:200; align-items:center; justify-content:center; padding:1rem; }
.modal-backdrop.open { display:flex; }
.modal { background:var(--white); border-radius:var(--radius-xl); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:2rem; box-shadow:var(--shadow-lg); animation:slideUp 0.2s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.modal h2 { font-family:var(--font-display); font-size:1.5rem; font-weight:400; color:var(--kiln); margin-bottom:1.5rem; }
.form-row { margin-bottom:1rem; }
.form-row label { display:block; font-size:0.6875rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--smoke); margin-bottom:0.35rem; }
.form-row input,.form-row textarea,.form-row select { width:100%; font-family:var(--font-body); font-size:0.875rem; padding:0.65rem 0.875rem; border:1px solid var(--border-md); border-radius:var(--radius-md); background:var(--sand); color:var(--kiln); outline:none; transition:border-color 0.2s; }
.form-row input:focus,.form-row textarea:focus,.form-row select:focus { border-color:var(--clay); background:var(--white); }
.form-row textarea { resize:vertical; min-height:80px; line-height:1.55; }
.form-2col { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }
.form-actions { display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--border); }

.empty-state { text-align:center; padding:3rem 2rem; color:var(--fog); }
.empty-state .big { font-family:var(--font-display); font-size:1.25rem; color:var(--smoke); margin-bottom:0.5rem; font-style:italic; }
#toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--kiln); color:var(--white); padding:0.65rem 1.25rem; border-radius:100px; font-size:0.8125rem; z-index:500; transition:transform 0.3s ease; white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0); }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.section-divider { margin:1.25rem 0; border:none; border-top:1px solid var(--border); }
@media(max-width:640px) { .topbar{padding:0 1rem;} .main{padding:1rem 1rem 3rem;} .form-2col{grid-template-columns:1fr;} .search-input{width:140px;} .topbar-brand span{display:none;} }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">The Pottery Toolkit</div>
    <div class="auth-sub">Product Tracker</div>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password" />
    <div class="auth-error" id="auth-error"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="tryLogin()">Enter</button>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="topbar-brand">The Pottery Toolkit <span>Product Tracker</span></div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New idea
    </button>
  </header>
  <main class="main">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="toolbar">
      <div class="filter-pills" id="filter-pills">
        <button class="pill active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="pill" data-filter="Idea" onclick="setFilter('Idea',this)">Idea</button>
        <button class="pill" data-filter="Research" onclick="setFilter('Research',this)">Research</button>
        <button class="pill" data-filter="Prototyping" onclick="setFilter('Prototyping',this)">Prototyping</button>
        <button class="pill" data-filter="Testing" onclick="setFilter('Testing',this)">Testing</button>
        <button class="pill" data-filter="Ready" onclick="setFilter('Ready',this)">Ready to launch</button>
        <button class="pill" data-filter="Paused" onclick="setFilter('Paused',this)">Paused</button>
      </div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Search ideas…" id="search-input" oninput="renderList()" />
      </div>
    </div>
    <div class="ideas-grid" id="ideas-grid"></div>
  </main>
</div>

<!-- MAIN IDEA MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal">
    <h2 id="modal-title">New product idea</h2>
    <input type="hidden" id="modal-id" />
    <div class="form-row"><label>Product name *</label><input type="text" id="f-name" placeholder="e.g. Adjustable throwing bat" /></div>
    <div class="form-row"><label>Category</label><input type="text" id="f-category" placeholder="e.g. Wheel tools, Glazing, Kilns…" /></div>
    <div class="form-row"><label>Description</label><textarea id="f-description" placeholder="What is this product?"></textarea></div>
    <div class="form-row"><label>Problem it solves</label><textarea id="f-problem" placeholder="What potter pain point does this address?"></textarea></div>
    <div class="form-row"><label>Target customer</label><input type="text" id="f-customer" placeholder="e.g. Beginner throwers, studio teachers…" /></div>
    <div class="form-2col">
      <div class="form-row"><label>Stage</label>
        <select id="f-stage"><option>Idea</option><option>Research</option><option>Prototyping</option><option>Testing</option><option>Ready</option><option>Paused</option></select>
      </div>
      <div class="form-row"><label>Priority</label>
        <select id="f-priority"><option>High</option><option>Medium</option><option>Low</option></select>
      </div>
    </div>
    <div class="form-row"><label>Tags (comma-separated)</label><input type="text" id="f-tags" placeholder="e.g. hardware, beginner-friendly, seasonal" /></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveIdea()">Add idea</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://iepwcjilrzkcogcgdtko.supabase.co';

// AUTH
function tryLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === APP_PASSWORD) {
    sessionStorage.setItem('ptk_auth','1');
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadIdeas();
  } else {
    document.getElementById('auth-error').textContent = 'Incorrect password.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });

// DATA
async function loadIdeas() {
  document.getElementById('ideas-grid').innerHTML = '<div style="padding:3rem;text-align:center;color:var(--fog);font-size:.875rem">Loading…</div>';
  const { data, error } = await db.from('ideas').select('*').order('created_at',{ascending:false});
  if (error) { showToast('Error: '+error.message); return; }
  ideas = data || [];
  render();
}

async function saveIdea() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const payload = {
    name,
    category: document.getElementById('f-category').value.trim(),
    description: document.getElementById('f-description').value.trim(),
    problem: document.getElementById('f-problem').value.trim(),
    target_customer: document.getElementById('f-customer').value.trim(),
    stage: document.getElementById('f-stage').value,
    priority: document.getElementById('f-priority').value,
    tags: document.getElementById('f-tags').value.trim(),
  };
  const editId = document.getElementById('modal-id').value;
  let error;
  if (editId) {
    ({ error } = await db.from('ideas').update(payload).eq('id',editId));
  } else {
    payload.notes = []; payload.versions = []; payload.inspiration_links = [];
    payload.inspiration_pics = []; payload.manufacturers = []; payload.costs = [];
    payload.pricing = []; payload.third_parties = []; payload.file_refs = [];
    ({ error } = await db.from('ideas').insert(payload));
  }
  btn.disabled = false;
  btn.textContent = editId ? 'Save changes' : 'Add idea';
  if (error) { showToast('Error: '+error.message); return; }
  showToast(editId ? 'Idea updated' : 'Idea added');
  closeModal();
  await loadIdeas();
}

async function patchIdea(id, patch) {
  const { error } = await db.from('ideas').update(patch).eq('id',id);
  if (error) { showToast('Error saving'); return false; }
  const idea = ideas.find(i=>i.id===id);
  if (idea) Object.assign(idea, patch);
  return true;
}

async function uploadImage(ideaId, file) {
  const ext = file.name.split('.').pop();
  const path = `${ideaId}/${Date.now()}.${ext}`;
  const { data, error } = await db.storage.from(STORAGE_BUCKET).upload(path, file, { upsert: false });
  if (error) { showToast('Upload error: ' + error.message); return null; }
  const { data: urlData } = db.storage.from(STORAGE_BUCKET).getPublicUrl(path);
  return urlData.publicUrl;
}

// RENDER
function render() { renderStats(); renderList(); }

function renderStats() {
  const t = ideas.length;
  const ip = ideas.filter(i=>['Prototyping','Testing'].includes(i.stage)).length;
  const rd = ideas.filter(i=>i.stage==='Ready').length;
  const hi = ideas.filter(i=>i.priority==='High').length;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card ${activeFilter==='all'&&!document.querySelector('.stat-card.active-stat')?'':''}" onclick="setStatFilter('all')" id="stat-all">
      <div class="stat-num">${t}</div><div class="stat-label">Total ideas</div>
    </div>
    <div class="stat-card" onclick="setStatFilter('inprogress')" id="stat-inprogress">
      <div class="stat-num">${ip}</div><div class="stat-label">In progress</div>
    </div>
    <div class="stat-card" onclick="setStatFilter('Ready')" id="stat-ready">
      <div class="stat-num">${rd}</div><div class="stat-label">Ready to launch</div>
    </div>
    <div class="stat-card" onclick="setStatFilter('highpri')" id="stat-highpri">
      <div class="stat-num">${hi}</div><div class="stat-label">High priority</div>
    </div>`;
}

function setStatFilter(f) {
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active-stat'));
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  const card = document.getElementById('stat-'+f);
  if (card) card.classList.add('active-stat');
  if (f==='all') { activeFilter='all'; document.querySelector('[data-filter="all"]').classList.add('active'); }
  else if (f==='inprogress') { activeFilter='inprogress'; }
  else if (f==='Ready') { activeFilter='Ready'; document.querySelector('[data-filter="Ready"]').classList.add('active'); }
  else if (f==='highpri') { activeFilter='highpri'; }
  renderList();
}

function renderList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = ideas;
  if (activeFilter==='inprogress') filtered = filtered.filter(i=>['Prototyping','Testing'].includes(i.stage));
  else if (activeFilter==='highpri') filtered = filtered.filter(i=>i.priority==='High');
  else if (activeFilter!=='all') filtered = filtered.filter(i=>i.stage===activeFilter);
  if (q) filtered = filtered.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q)||(i.tags||'').toLowerCase().includes(q));
  const el = document.getElementById('ideas-grid');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="big">Nothing here yet</div><p>Add your first product idea using the button above.</p></div>';
    return;
  }
  el.innerHTML = filtered.map(idea => ideaCardHTML(idea)).join('');
}

      <div class="field-group"><div class="form-row-label">Folder reference</div><input type="text" id="fref-loc-${idea.id}" placeholder="e.g. MEGA › Product Specs › Bat v2" onclick="event.stopPropagation()" /></div>
      <div class="field-group"><div class="form-row-label">Notes</div><textarea id="fref-note-${idea.id}" placeholder="Any additional context about this file…" rows="2" onclick="event.stopPropagation()"></textarea></div>
      <div class="form-actions"><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();addFileRef('${idea.id}')">Add file reference</button></div>
    </div>`;

  const tabs = [
    {id:'overview',label:'Overview'},
    {id:'versions',label:`Versions${versions.length?' ('+versions.length+')':''}`},
    {id:'inspiration',label:'Inspiration'},
    {id:'financials',label:'Financials'},
    {id:'production',label:'Production'},
    {id:'files',label:`Files${refs.length?' ('+refs.length+')':''}`},
  ];

  return `
  <div class="idea-card ${isOpen?'open':''}" id="card-${idea.id}">
    <div class="idea-card-header" onclick="toggleCard('${idea.id}')">
      <div class="priority-pip ${PIP_CLASS[idea.priority]||'pip-low'}"></div>
      <div class="idea-main">
        <div class="idea-name-row">
          <div class="idea-name">${esc(idea.name)}</div>
          <button class="edit-name-btn" onclick="event.stopPropagation();openEditModal('${idea.id}')" title="Edit core details">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
        <div class="idea-chips">
          <span class="badge ${BADGE_CLASS[idea.stage]||''}">${idea.stage}</span>
          ${idea.category?`<span class="cat-chip">${esc(idea.category)}</span>`:''}
          <span style="font-size:.6875rem;color:var(--fog)">${idea.priority} priority</span>
          ${versions.length?`<span style="font-size:.6875rem;color:var(--fog)">v${versions[0].num}</span>`:''}
        </div>
      </div>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="idea-body">
      <div class="tab-bar">
        ${tabs.map(t=>`<button class="tab-btn ${tab===t.id?'active':''}" onclick="event.stopPropagation();setTab('${idea.id}','${t.id}')">${t.label}</button>`).join('')}
      </div>
      <div class="tab-panel ${tab==='overview'?'active':''}">${overviewTab}</div>
      <div class="tab-panel ${tab==='versions'?'active':''}">${versionsTab}</div>
      <div class="tab-panel ${tab==='inspiration'?'active':''}">${inspirationTab}</div>
      <div class="tab-panel ${tab==='financials'?'active':''}">${financialsTab}</div>
      <div class="tab-panel ${tab==='production'?'active':''}">${productionTab}</div>
      <div class="tab-panel ${tab==='files'?'active':''}">${filesTab}</div>
      <div class="card-controls">
        <div style="display:flex;align-items:center;gap:.4rem">
          <span style="font-size:.75rem;color:var(--smoke)">Stage</span>
          <select class="inline-select" onchange="updateField('${idea.id}','stage',this.value)" onclick="event.stopPropagation()">
            ${STAGES.map(s=>`<option value="${s}" ${idea.stage===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:.4rem">
          <span style="font-size:.75rem;color:var(--smoke)">Priority</span>
          <select class="inline-select" onchange="updateField('${idea.id}','priority',this.value)" onclick="event.stopPropagation()">
            ${['High','Medium','Low'].map(p=>`<option value="${p}" ${idea.priority===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="spacer"></div>
        <span class="meta-date">Added ${fmtDate(idea.created_at)}</span>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteIdea('${idea.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Delete
        </button>
      </div>
    </div>
  </div>`;
}

function calcMargin(costs, price) {
  const total = costs.reduce((s,c)=>s+parseFloat(c.cost||0),0);
  if (!total||!price) return '—';
  return ((parseFloat(price)-total)/parseFloat(price)*100).toFixed(0)+'%';
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ARRAY ACTIONS
async function addNote(id) {
  const ta = document.getElementById('note-ta-'+id);
  const text = ta.value.trim(); if (!text) return;
  const idea = ideas.find(i=>i.id===id);
  const notes = [...(idea.notes||[]),{text,date:new Date().toISOString()}];
  if (await patchIdea(id,{notes})) { ta.value=''; renderList(); showToast('Note added'); }
}

async function addVersion(id) {
  const num = document.getElementById('ver-num-'+id).value.trim();
  const notes = document.getElementById('ver-notes-'+id).value.trim();
  if (!num||!notes) return;
  const idea = ideas.find(i=>i.id===id);
  const versions = [{num,notes,date:new Date().toISOString()},...(idea.versions||[])];
  if (await patchIdea(id,{versions})) { renderList(); showToast('Version logged'); }
}

async function addInspirationLink(id) {
  const url = document.getElementById('link-url-'+id).value.trim(); if (!url) return;
  const label = document.getElementById('link-label-'+id).value.trim();
  const note = document.getElementById('link-note-'+id).value.trim();
  const idea = ideas.find(i=>i.id===id);
  const inspiration_links = [...(idea.inspiration_links||[]),{url,label,note}];
  if (await patchIdea(id,{inspiration_links})) { renderList(); showToast('Link added'); }
}

async function handleDrop(id, event) {
  const file = event.dataTransfer.files[0];
  if (!file) return;
  await handleImageUpload(id, { files: [file] });
}

async function handleImageUpload(id, input) {
  const file = input.files[0]; if (!file) return;
  const status = document.getElementById('img-upload-status-'+id);
  status.style.display='block'; status.textContent='Uploading…';
  const url = await uploadImage(id, file);
  if (!url) { status.textContent='Upload failed.'; return; }
  const label = document.getElementById('pic-label-'+id).value.trim();
  const note = document.getElementById('pic-note-'+id).value.trim();
  const idea = ideas.find(i=>i.id===id);
  const inspiration_pics = [...(idea.inspiration_pics||[]),{url,label,note}];
  if (await patchIdea(id,{inspiration_pics})) { status.style.display='none'; renderList(); showToast('Image uploaded'); }
}

async function addInspirationPicByUrl(id) {
  const url = document.getElementById('pic-url-'+id).value.trim(); if (!url) return;
  const label = document.getElementById('pic-label-'+id).value.trim();
  const note = document.getElementById('pic-note-'+id).value.trim();
  const idea = ideas.find(i=>i.id===id);
  const inspiration_pics = [...(idea.inspiration_pics||[]),{url,label,note}];
  if (await patchIdea(id,{inspiration_pics})) { renderList(); showToast('Image added'); }
}

async function addCost(id) {
  const item = document.getElementById('cost-item-'+id).value.trim();
  const cost = document.getElementById('cost-amt-'+id).value.trim();
  if (!item||!cost) return;
  const note = document.getElementById('cost-note-'+id).value.trim();
  const idea = ideas.find(i=>i.id===id);
  const costs = [...(idea.costs||[]),{item,cost,note}];
  if (await patchIdea(id,{costs})) { renderList(); showToast('Cost added'); }
}

async function addPricing(id) {
  const tier = document.getElementById('price-tier-'+id).value.trim();
  const price = document.getElementById('price-amt-'+id).value.trim();
  if (!tier||!price) return;
  const note = document.getElementById('price-note-'+id).value.trim();
  const idea = ideas.find(i=>i.id===id);
  const pricing = [...(idea.pricing||[]),{tier,price,note}];
  if (await patchIdea(id,{pricing})) { renderList(); showToast('Pricing added'); }
}

async function addManufacturer(id) {
  const name = document.getElementById('mfr-name-'+id).value.trim(); if (!name) return;
  const idea = ideas.find(i=>i.id===id);
  const manufacturers = [...(idea.manufacturers||[]),{
    name,
    location: document.getElementById('mfr-loc-'+id).value.trim(),
    contact: document.getElementById('mfr-contact-'+id).value.trim(),
    url: document.getElementById('mfr-url-'+id).value.trim(),
    note: document.getElementById('mfr-note-'+id).value.trim()
  }];
  if (await patchIdea(id,{manufacturers})) { renderList(); showToast('Manufacturer added'); }
}

async function addThirdParty(id) {
  const role = document.getElementById('tp-role-'+id).value.trim(); if (!role) return;
  const idea = ideas.find(i=>i.id===id);
  const third_parties = [...(idea.third_parties||[]),{
    role,
    name: document.getElementById('tp-name-'+id).value.trim(),
    note: document.getElementById('tp-note-'+id).value.trim()
  }];
  if (await patchIdea(id,{third_parties})) { renderList(); showToast('Third party added'); }
}

async function addFileRef(id) {
  const label = document.getElementById('fref-label-'+id).value.trim(); if (!label) return;
  const idea = ideas.find(i=>i.id===id);
  const file_refs = [...(idea.file_refs||[]),{
    label,
    type: document.getElementById('fref-type-'+id).value,
    url: document.getElementById('fref-url-'+id).value.trim(),
    location: document.getElementById('fref-loc-'+id).value.trim(),
    note: document.getElementById('fref-note-'+id).value.trim()
  }];
  if (await patchIdea(id,{file_refs})) { renderList(); showToast('File reference added'); }
}

async function deleteArrayItem(id, field, idx) {
  const idea = ideas.find(i=>i.id===id);
  const arr = (idea[field]||[]).filter((_,i)=>i!==idx);
  if (await patchIdea(id,{[field]:arr})) { renderList(); showToast('Removed'); }
}

async function updateField(id, field, value) {
  if (await patchIdea(id,{[field]:value})) { render(); showToast('Saved'); }
}

async function deleteIdea(id) {
  if (!confirm('Delete this idea? This cannot be undone.')) return;
  const { error } = await db.from('ideas').delete().eq('id',id);
  if (error) { showToast('Error: '+error.message); return; }
  ideas = ideas.filter(i=>i.id!==id);
  if (expandedId===id) expandedId=null;
  render(); showToast('Idea deleted');
}

// UI
function openLightbox(ideaId, picIdx) {
  const idea = ideas.find(i=>i.id===ideaId);
  const p = (idea.inspiration_pics||[])[picIdx];
  if (!p) return;
  const lb = document.createElement('div');
  lb.className = 'pic-lightbox';
  lb.innerHTML = `
    <div class="pic-lightbox-inner" onclick="event.stopPropagation()">
      <button class="pic-lightbox-close" onclick="document.body.removeChild(this.closest('.pic-lightbox'))">×</button>
      <img src="${esc(p.url)}" alt="${esc(p.label||'')}" />
      ${p.label?`<div class="pic-lightbox-label">${esc(p.label)}</div>`:''}
      ${p.note?`<div class="pic-lightbox-note">${esc(p.note)}</div>`:''}
      <div style="display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap">
        <a href="${esc(p.url)}" target="_blank" class="btn btn-ghost btn-sm">↗ Open original</a>
        <button class="btn btn-danger btn-sm" onclick="document.body.removeChild(this.closest('.pic-lightbox'));deleteArrayItem('${ideaId}','inspiration_pics',${picIdx})">Delete image</button>
      </div>
    </div>`;
  lb.addEventListener('click', () => document.body.removeChild(lb));
  document.body.appendChild(lb);
}


function setTab(id,tab) { activeTab[id]=tab; renderList(); }
function setFilter(f,el) {
  activeFilter=f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active-stat'));
  el.classList.add('active');
  renderList();
}

function openModal() {
  document.getElementById('modal-title').textContent='New product idea';
  document.getElementById('modal-id').value='';
  document.getElementById('modal-save-btn').textContent='Add idea';
  ['name','category','description','problem','customer','tags'].forEach(f=>document.getElementById('f-'+f).value='');
  document.getElementById('f-stage').value='Idea';
  document.getElementById('f-priority').value='Medium';
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),50);
}

function openEditModal(id) {
  const idea=ideas.find(i=>i.id===id); if(!idea) return;
  document.getElementById('modal-title').textContent='Edit idea';
  document.getElementById('modal-id').value=id;
  document.getElementById('modal-save-btn').textContent='Save changes';
  document.getElementById('f-name').value=idea.name||'';
  document.getElementById('f-category').value=idea.category||'';
  document.getElementById('f-description').value=idea.description||'';
  document.getElementById('f-problem').value=idea.problem||'';
  document.getElementById('f-customer').value=idea.target_customer||'';
  document.getElementById('f-stage').value=idea.stage||'Idea';
  document.getElementById('f-priority').value=idea.priority||'Medium';
  document.getElementById('f-tags').value=idea.tags||'';
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); }
function handleBackdropClick(e) { if(e.target===document.getElementById('modal-backdrop')) closeModal(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
